<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skyway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #09090f;
  --a: #007AFF;
  --live: #30D158;
  --plane: #FF9F0A;
  --rd: #FF3B30;
  --t: #ffffff;
  --t2: rgba(255,255,255,0.55);
  --t3: rgba(255,255,255,0.24);
  --bd: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--t); font-family:'Inter',sans-serif; overflow:hidden; height:100dvh; width:100vw; }
#map { position:absolute; inset:0; z-index:1; }
.leaflet-container { background:#09090f !important; }

/* TOPBAR */
#topbar {
  position:absolute; top:0; left:0; right:0; z-index:400;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; padding-top:max(12px, env(safe-area-inset-top));
  background:rgba(9,9,15,0.85); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);
}
.logo { display:flex; align-items:center; gap:8px; }
.logo svg { width:22px; height:22px; }
.logo-text { font-size:17px; font-weight:800; letter-spacing:4px; color:#fff; }
#clock { font-family:'DM Mono',monospace; font-size:13px; color:var(--t2); }
#searchBtn { background:rgba(255,255,255,0.08); border:1px solid var(--bd); border-radius:10px; padding:7px 12px; color:var(--t2); font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; }
#searchBtn:hover { background:rgba(255,255,255,0.13); }

/* HUD STRIP */
#hud {
  position:absolute; top:calc(max(12px, env(safe-area-inset-top)) + 54px); left:12px; right:12px; z-index:390;
  background:rgba(11,11,19,0.92); backdrop-filter:blur(16px);
  border:1px solid var(--a); border-radius:14px; padding:10px 14px;
  display:none; flex-direction:column; gap:4px;
}
#hud.show { display:flex; }
#hudTop { display:flex; align-items:center; justify-content:space-between; }
#hudCall { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; color:var(--a); }
#hudRoute { font-size:12px; color:var(--t2); }
#hudClose { background:none; border:none; color:var(--t3); font-size:18px; cursor:pointer; line-height:1; }
#hudStats { display:flex; gap:16px; flex-wrap:wrap; }
.hstat { font-size:11px; color:var(--t2); }
.hstat b { color:var(--t); font-weight:600; }

/* COUNT BADGE */
#countBadge {
  position:absolute; z-index:390; bottom:80px; left:12px;
  background:rgba(11,11,19,0.85); backdrop-filter:blur(12px);
  border:1px solid var(--bd); border-radius:20px; padding:5px 12px;
  font-size:11px; color:var(--t2);
}
#countBadge b { color:var(--t); }

/* LIVE BADGE */
#liveBadge {
  position:absolute; z-index:390; bottom:80px; right:12px;
  background:rgba(11,11,19,0.85); backdrop-filter:blur(12px);
  border:1px solid var(--bd); border-radius:20px; padding:5px 12px;
  display:flex; align-items:center; gap:6px; font-size:11px; color:var(--t2);
}
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--live); animation:livePulse 1.5s infinite; }
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }

/* BOTTOM NAV */
#nav {
  position:absolute; bottom:0; left:0; right:0; z-index:410;
  background:rgba(9,9,15,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  display:flex; padding-bottom:max(8px, env(safe-area-inset-bottom));
}
.ntab {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:9px 4px 5px; cursor:pointer; position:relative; gap:3px;
  color:var(--t3); font-size:10px; font-weight:500; transition:color 0.2s;
}
.ntab svg { width:22px; height:22px; }
.ntab.active { color:var(--a); }
.ntab .rdot {
  position:absolute; top:6px; right:calc(50% - 14px);
  width:7px; height:7px; border-radius:50%; background:var(--rd);
}

/* PANEL */
#panel {
  position:absolute; bottom:0; left:0; right:0; z-index:420;
  background:rgba(11,11,19,0.98); backdrop-filter:blur(30px);
  border-radius:24px 24px 0 0; border-top:1px solid var(--bd);
  max-height:75vh; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#panel.open { transform:translateY(0); }
.panelHandle { width:36px; height:4px; border-radius:2px; background:var(--bd); margin:10px auto 2px; flex-shrink:0; }
.panelHead { padding:8px 16px 10px; border-bottom:1px solid var(--bd); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.panelTitle { font-size:16px; font-weight:700; }
.panelClose { background:rgba(255,255,255,0.08); border:none; border-radius:50%; width:28px; height:28px; color:var(--t2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.panelScroll { overflow-y:auto; flex:1; padding:12px 12px 80px; }

/* CARDS / ROWS */
.card { background:rgba(255,255,255,0.04); border:1px solid var(--bd); border-radius:14px; padding:12px 14px; margin-bottom:8px; }
.flRow {
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border-radius:12px; cursor:pointer; transition:background 0.15s;
  border:1px solid transparent;
}
.flRow:hover, .flRow:active { background:rgba(255,255,255,0.06); border-color:var(--bd); }
.flCall { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--a); min-width:72px; }
.flInfo { flex:1; font-size:12px; color:var(--t2); }
.flInfo b { color:var(--t); font-weight:500; }
.flRight { text-align:right; font-size:11px; color:var(--t2); }
.flRight b { color:var(--t); font-weight:500; display:block; }

/* SORT CHIPS */
.chips { display:flex; gap:6px; padding:0 0 10px; overflow-x:auto; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500;
  background:rgba(255,255,255,0.07); border:1px solid var(--bd); color:var(--t2); cursor:pointer; transition:all 0.15s;
}
.chip.on { background:var(--a); border-color:var(--a); color:#fff; }

/* STATUS BADGES */
.badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
.badge.green { background:rgba(48,209,88,0.18); color:#30D158; }
.badge.blue { background:rgba(0,122,255,0.18); color:#007AFF; }
.badge.orange { background:rgba(255,159,10,0.18); color:#FF9F0A; }
.badge.red { background:rgba(255,59,48,0.18); color:#FF3B30; }
.badge.gray { background:rgba(255,255,255,0.1); color:var(--t2); }

/* DETAIL MODAL */
#detail {
  position:absolute; bottom:0; left:0; right:0; z-index:460;
  background:rgba(11,11,19,0.99); backdrop-filter:blur(30px);
  border-radius:24px 24px 0 0; border-top:1px solid var(--bd);
  max-height:85vh; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#detail.open { transform:translateY(0); }
#detailScroll { overflow-y:auto; flex:1; padding:0 14px 100px; }
.dHead { padding:16px 14px 12px; border-bottom:1px solid var(--bd); flex-shrink:0; display:flex; align-items:flex-start; justify-content:space-between; }
.dCall { font-family:'DM Mono',monospace; font-size:26px; font-weight:500; color:var(--a); line-height:1; }
.dAirline { font-size:13px; color:var(--t2); margin-top:4px; }
.dClose { background:rgba(255,255,255,0.1); border:none; border-radius:50%; width:32px; height:32px; color:var(--t); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.dSec { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--t3); text-transform:uppercase; margin:14px 0 6px; }
.routeBar { display:flex; align-items:center; gap:10px; padding:12px 0 4px; }
.rCode { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; color:var(--t); text-align:center; }
.rCity { font-size:10px; color:var(--t2); text-align:center; margin-top:2px; }
.progWrap { flex:1; }
.progTrack { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; position:relative; }
.progFill { height:100%; background:var(--a); border-radius:2px; position:relative; transition:width 0.5s; }
.progFill::after { content:'✈'; position:absolute; right:-8px; top:-8px; font-size:14px; }
.progPct { font-size:10px; color:var(--t2); text-align:center; margin-top:4px; }
.statsGrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.statCard { background:rgba(255,255,255,0.04); border:1px solid var(--bd); border-radius:12px; padding:10px 12px; }
.statLabel { font-size:10px; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:0.8px; }
.statVal { font-size:16px; font-weight:700; color:var(--t); margin-top:3px; }
.statSub { font-size:11px; color:var(--t2); }
.wxCard { background:rgba(0,122,255,0.08); border:1px solid rgba(0,122,255,0.2); border-radius:12px; padding:12px 14px; }
.wxRow { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.wxMain { font-size:15px; font-weight:600; }
.wxTemp { font-size:24px; font-weight:700; color:var(--a); }
.wxSub { font-size:12px; color:var(--t2); margin-top:4px; }
.emgBanner { background:rgba(255,59,48,0.12); border:1px solid rgba(255,59,48,0.35); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
.emgBannerTitle { font-size:13px; font-weight:700; color:var(--rd); display:flex; align-items:center; gap:6px; }
.emgBannerSub { font-size:12px; color:rgba(255,59,48,0.8); margin-top:3px; }
#trackBtn { margin:12px 14px; padding:14px; border-radius:14px; background:var(--a); border:none; color:#fff; font-size:15px; font-weight:600; cursor:pointer; width:calc(100% - 28px); }
#trackBtn:hover { background:#0066dd; }

/* EMERGENCY PANEL */
.emgHeader { background:rgba(255,59,48,0.08); border:1px solid rgba(255,59,48,0.2); border-radius:14px; padding:12px 14px; margin-bottom:10px; }
.emgHeaderTitle { font-size:13px; font-weight:700; color:var(--rd); }
.emgHeaderSub { font-size:12px; color:rgba(255,59,48,0.7); margin-top:2px; }
.emgRow {
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border-radius:12px; cursor:pointer; transition:background 0.15s; border:1px solid transparent;
}
.emgRow:hover { background:rgba(255,59,48,0.06); border-color:rgba(255,59,48,0.15); }
.emgCall { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--rd); min-width:80px; }
.sqBadge { font-family:'DM Mono',monospace; font-size:11px; padding:2px 7px; border-radius:6px; background:rgba(255,59,48,0.15); color:var(--rd); border:1px solid rgba(255,59,48,0.25); }

/* ATC */
#atcPanel .panelScroll { padding-bottom:16px; }
#atcLog { display:flex; flex-direction:column; gap:6px; padding:4px 0; }
.atcMsg {
  background:rgba(255,255,255,0.04); border:1px solid var(--bd); border-radius:12px; padding:10px 12px;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.atcTop { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.atcFrom { font-family:'DM Mono',monospace; font-size:12px; color:var(--a); font-weight:500; }
.atcTime { font-size:10px; color:var(--t3); }
.atcText { font-size:13px; color:var(--t2); line-height:1.5; }
#atcToggle { padding:8px 16px; border-radius:20px; border:1px solid var(--bd); background:rgba(255,255,255,0.07); color:var(--t2); font-size:12px; cursor:pointer; }
#atcToggle.on { background:rgba(0,122,255,0.15); border-color:var(--a); color:var(--a); }

/* AIRPORTS */
.aptRow { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:12px; cursor:pointer; transition:background 0.15s; }
.aptRow:hover { background:rgba(255,255,255,0.06); }
.aptCode { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; color:var(--a); min-width:50px; }
.aptInfo { flex:1; font-size:12px; color:var(--t2); }
.aptInfo b { color:var(--t); font-weight:600; display:block; font-size:13px; }
.aptTraffic { font-size:11px; color:var(--t2); text-align:right; }
.aptTraffic b { color:var(--t); font-weight:600; display:block; }

/* SEARCH OVERLAY */
#searchOverlay {
  position:absolute; inset:0; z-index:500; background:rgba(9,9,15,0.97); backdrop-filter:blur(20px);
  display:none; flex-direction:column; padding:max(16px,env(safe-area-inset-top)) 16px 16px;
}
#searchOverlay.open { display:flex; }
#searchBar { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
#searchInput {
  flex:1; background:rgba(255,255,255,0.08); border:1px solid var(--bd); border-radius:12px;
  padding:11px 14px; color:var(--t); font-size:15px; font-family:'Inter',sans-serif; outline:none;
}
#searchInput:focus { border-color:rgba(0,122,255,0.5); }
#searchCancel { background:none; border:none; color:var(--a); font-size:15px; cursor:pointer; white-space:nowrap; }
#searchResults { overflow-y:auto; flex:1; }

/* PULSING EMERGENCY RING */
@keyframes emgRing {
  0% { box-shadow:0 0 0 0 rgba(255,59,48,0.6); }
  70% { box-shadow:0 0 0 12px rgba(255,59,48,0); }
  100% { box-shadow:0 0 0 0 rgba(255,59,48,0); }
}
.emg-ring { animation:emgRing 1.4s infinite; border-radius:50%; }

/* LEAFLET OVERRIDES */
.leaflet-control-attribution { display:none !important; }
.leaflet-control-zoom a { background:rgba(11,11,19,0.9) !important; color:#fff !important; border:1px solid var(--bd) !important; }
.lbl {
  background:rgba(9,9,15,0.82); color:var(--t); font-family:'DM Mono',monospace;
  font-size:10px; padding:2px 5px; border-radius:4px; border:1px solid rgba(255,255,255,0.15);
  white-space:nowrap; pointer-events:auto; cursor:pointer; margin-top:2px;
}
.lbl:hover { background:rgba(0,122,255,0.25); border-color:var(--a); }
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="white"/>
    </svg>
    <span class="logo-text">SKYWAY</span>
  </div>
  <button id="searchBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Search
  </button>
  <span id="clock">00:00:00Z</span>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hudTop">
    <span id="hudCall">—</span>
    <span id="hudRoute">—</span>
    <button id="hudClose" onclick="clearSel()">✕</button>
  </div>
  <div id="hudStats"></div>
</div>

<!-- COUNT + LIVE BADGES -->
<div id="countBadge"><b id="visCount">0</b> aircraft visible</div>
<div id="liveBadge"><span class="live-dot"></span>LIVE</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <div class="ntab active" id="tab-map" onclick="switchTab('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    Map
  </div>
  <div class="ntab" id="tab-flights" onclick="switchTab('flights')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Flights
  </div>
  <div class="ntab" id="tab-atc" onclick="switchTab('atc')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    ATC
  </div>
  <div class="ntab" id="tab-airports" onclick="switchTab('airports')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Airports
  </div>
  <div class="ntab" id="tab-emergency" onclick="switchTab('emergency')">
    <div class="rdot"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Emergency
  </div>
</div>

<!-- PANELS -->
<div id="panel">
  <div class="panelHandle"></div>

  <!-- FLIGHTS PANEL -->
  <div id="flightsPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="panelHead">
      <span class="panelTitle">Flights</span>
      <button class="panelClose" onclick="closePanel()">✕</button>
    </div>
    <div style="padding:10px 12px 0;flex-shrink:0;">
      <div class="chips" id="sortChips">
        <div class="chip on" onclick="setSort('callsign')">Callsign</div>
        <div class="chip" onclick="setSort('altitude')">Altitude</div>
        <div class="chip" onclick="setSort('speed')">Speed</div>
        <div class="chip" onclick="setSort('origin')">Origin</div>
        <div class="chip" onclick="setSort('dest')">Dest</div>
      </div>
    </div>
    <div class="panelScroll" id="flightsList"></div>
  </div>

  <!-- ATC PANEL -->
  <div id="atcPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="panelHead">
      <span class="panelTitle">ATC Comms</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="atcToggle" onclick="toggleAtc()">● LIVE</button>
        <button class="panelClose" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panelScroll"><div id="atcLog"></div></div>
  </div>

  <!-- AIRPORTS PANEL -->
  <div id="airportsPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="panelHead">
      <span class="panelTitle">Airports</span>
      <button class="panelClose" onclick="closePanel()">✕</button>
    </div>
    <div class="panelScroll" id="airportsList"></div>
  </div>

  <!-- EMERGENCY PANEL -->
  <div id="emergencyPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="panelHead">
      <span class="panelTitle" style="color:var(--rd);">⚠ Emergency</span>
      <button class="panelClose" onclick="closePanel()">✕</button>
    </div>
    <div class="panelScroll" id="emergencyList"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail">
  <div class="panelHandle"></div>
  <div class="dHead" id="detailHead">
    <div>
      <div class="dCall" id="dCall">—</div>
      <div class="dAirline" id="dAirline">—</div>
    </div>
    <button class="dClose" onclick="closeDetail()">✕</button>
  </div>
  <div id="detailScroll">
    <div id="detailBody"></div>
  </div>
  <button id="trackBtn" onclick="trackFromDetail()">Track on Map</button>
</div>

<!-- SEARCH OVERLAY -->
<div id="searchOverlay">
  <div id="searchBar">
    <input id="searchInput" type="text" placeholder="Search callsign, route, airport…" oninput="doSearch(this.value)">
    <button id="searchCancel" onclick="closeSearch()">Cancel</button>
  </div>
  <div id="searchResults"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const AIRLINES = [
  {code:'AAL',name:'American Airlines'},{code:'UAL',name:'United Airlines'},
  {code:'DAL',name:'Delta Air Lines'},{code:'SWA',name:'Southwest Airlines'},

const STATUSES = ['En Route','Climbing','Descending','Cruising','Approach','Departed'];

function rnd(a,b){ return a + Math.random()*(b-a); }
function rndInt(a,b){ return Math.floor(rnd(a,b+1)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function compassDir(d){ const dirs=['N','NE','E','SE','S','SW','W','NW']; return dirs[Math.round(d/45)%8]; }

// ============================================================
// FLIGHT GENERATION
// ============================================================
function genFlight(id, overrides={}) {
  const al = pick(AIRLINES);
  const ac = pick(AIRCRAFT);
  const orig = pick(AIRPORTS);
  let dest = pick(AIRPORTS);
  while(dest.code === orig.code) dest = pick(AIRPORTS);
  const prog = rnd(0.05, 0.95);
  const lat = orig.lat + (dest.lat - orig.lat) * prog + rnd(-2,2);
  const lng = orig.lng + (dest.lng - orig.lng) * prog + rnd(-2,2);
  const dxLng = dest.lng - orig.lng;
  const dxLat = dest.lat - orig.lat;
  const hdg = ((Math.atan2(dxLng, dxLat) * 180 / Math.PI) + 360) % 360;
  const alt = rndInt(150, 430) * 100;
  const spd = rndInt(380, 520);
  const vspd = rndInt(-800, 800);
  const sq = String(rndInt(1000, 7499)).padStart(4,'0');
  const reg = al.code.substring(0,1) + '-' + String.fromCharCode(65+rndInt(0,25)) + String.fromCharCode(65+rndInt(0,25)) + String.fromCharCode(65+rndInt(0,25));
  return {
    id, callsign: al.code + rndInt(100,9999),
    airline: al.name, alCode: al.code,
    ac: ac.type||ac.code, acName: ac.name,
    orig: orig.iata, origName: orig.name, origCity: orig.city, origLat: orig.lat, origLng: orig.lng,
    dest: dest.iata, destName: dest.name, destCity: dest.city, destLat: dest.lat, destLng: dest.lng,
    lat, lng, hdg, alt, spd, vspd, sq, reg,
    prog: Math.round(prog*100),
    status: pick(STATUSES),
    emg: false,
    ...overrides
  };
}

const fl = [];
for(let i=0;i<1000;i++) fl.push(genFlight(i));

  {sq:'7700',label:'General Emergency',count:10},
  {sq:'7600',label:'Radio Failure',count:5},
  {sq:'7500',label:'Unlawful Interference',count:3}
];
const emfl = [];
let emgIdx = 1000;
for(const et of EMG_TYPES){
  for(let i=0;i<et.count;i++){
    const now = Date.now();
    const emgTime = new Date(now - rnd(0, 22*3600*1000));
    emfl.push(genFlight(emgIdx++, {
      sq: et.sq, emg: true, emgType: et.label,
      emgTime, emgActive: Math.random() < 0.75
    }));
  }
}
emfl.sort((a,b) => b.emgTime - a.emgTime);

// ============================================================
// MARKER MANAGEMENT (viewport culling)
// ============================================================
function planeSvg(color, size, glow){
  const g = glow ? `filter:drop-shadow(0 0 6px ${color});` : '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" style="${g}" fill="${color}"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`;
}

function makeIcon(f, selected){
  let color = f.emg ? '#FF3B30' : (selected ? '#007AFF' : '#FF9F0A');
  let size = selected ? 24 : (f.emg ? 20 : 18);
  let glow = selected;
  const html = `<div style="transform:rotate(${f.hdg}deg);width:${size}px;height:${size}px;">${planeSvg(color,size,glow)}</div>`;
  return L.divIcon({ html, className:'', iconSize:[size,size], iconAnchor:[size/2,size/2] });
}

function addOrUpdateMarker(f){
  const showLabel = mp.getZoom() >= 6;
  if(markers.has(f.id)){
    const {marker, label} = markers.get(f.id);
    marker.setLatLng([f.lat, f.lng]);
    marker.setIcon(makeIcon(f, selFlight && selFlight.id === f.id));
    if(label){
      label.setLatLng([f.lat, f.lng]);
      if(!showLabel){ label.getElement() && (label.getElement().style.display='none'); }
      else { label.getElement() && (label.getElement().style.display=''); }
    }
  } else {
    const isSel = selFlight && selFlight.id === f.id;
    const marker = L.marker([f.lat, f.lng], { icon: makeIcon(f, isSel), zIndexOffset: f.emg ? 500 : 0 });
    marker.on('click', () => sel(f));
    marker.addTo(mp);

    let label = null;
    if(true){ // always create label, show/hide based on zoom
      const lblHtml = `<div class="lbl" onclick="openDetail(${f.id})" style="display:${showLabel?'':'none'}">${f.callsign}</div>`;
      label = L.marker([f.lat, f.lng], {
        icon: L.divIcon({ html: lblHtml, className:'', iconSize:[80,20], iconAnchor:[-4, 0] }),
        interactive: true, zIndexOffset: f.emg ? 600 : 100
      }).addTo(mp);
    }

    if(f.emg){
      // pulsing ring overlay
      const ring = L.circleMarker([f.lat, f.lng], {
        radius:14, color:'#FF3B30', fillOpacity:0, weight:2, className:'emg-ring', interactive:false
      }).addTo(mp);
      markers.set(f.id, {marker, label, ring});
    } else {
      markers.set(f.id, {marker, label});
    }
  }
}

function removeMarker(id){
  if(markers.has(id)){
    const {marker, label, ring} = markers.get(id);
    mp.removeLayer(marker);
    if(label) mp.removeLayer(label);
    if(ring) mp.removeLayer(ring);
    markers.delete(id);
  }
}

function updateVisibleMarkers(){
  const bounds = mp.getBounds().pad(0.3);
  const showLabel = mp.getZoom() >= 6;
  let visCount = 0;
  for(const f of allFl){
    const inBounds = bounds.contains([f.lat, f.lng]);
    if(inBounds){
      addOrUpdateMarker(f);
      visCount++;
      // update label visibility
      if(markers.has(f.id)){
        const {label} = markers.get(f.id);
        if(label && label.getElement()){
          const el = label.getElement().querySelector('.lbl');
          if(el) el.style.display = showLabel ? '' : 'none';
        }
      }
    } else {
      if(markers.has(f.id)) removeMarker(f.id);
    }
  }
  document.getElementById('visCount').textContent = visCount;
}

mp.on('moveend zoomend', updateVisibleMarkers);

function openDetail(id){
  const f = allFl.find(x => x.id === id);
  if(!f) return;
  detailFlight = f;
  document.getElementById('dCall').textContent = f.callsign;
  document.getElementById('dAirline').textContent = f.airline + ' · ' + f.acName;

  let statusClass = 'blue';
  if(f.status==='Approach'||f.status==='Descending') statusClass='orange';
  if(f.status==='Departed') statusClass='gray';
  if(f.emg) statusClass='red';

  let body = '';

  // Status
  body += `<div style="margin:10px 0 0;"><span class="badge ${statusClass}">${f.status}</span> <span class="badge gray" style="margin-left:4px;">${f.ac}</span></div>`;
  body += `<div style="font-size:12px;color:var(--t2);margin-top:6px;">Reg: <span style="font-family:'DM Mono',monospace;color:var(--t);">${f.reg}</span></div>`;

  // Emergency banner
  if(f.emg){
    const ago = timeAgo(f.emgTime);
    body += `<div class="emgBanner" style="margin-top:10px;">
      <div class="emgBannerTitle">⚠ SQUAWK ${f.sq} — ${f.emgType}</div>
      <div class="emgBannerSub">Declared ${ago} · ${f.emgActive?'<span style="color:var(--rd)">ACTIVE</span>':'<span style="color:var(--t2)">Resolved</span>'}</div>
    </div>`;
  }

  // Route
  body += `<div class="dSec">ROUTE</div>
  <div class="card" style="padding:14px;">
    <div class="routeBar">
      <div><div class="rCode">${f.orig}</div><div class="rCity">${f.origCity}</div></div>
      <div class="progWrap">
        <div class="progTrack"><div class="progFill" style="width:${f.prog}%"></div></div>
        <div class="progPct">${f.prog}% complete</div>
      </div>
      <div><div class="rCode">${f.dest}</div><div class="rCity">${f.destCity}</div></div>
    </div>
  </div>`;

  // Stats
  const vr = f.vspd;
  const vrColor = vr > 100 ? 'var(--live)' : vr < -100 ? 'var(--rd)' : 'var(--t)';
  const vrLabel = vr > 100 ? '↑ Climbing' : vr < -100 ? '↓ Descending' : '→ Level';
  const flNum = Math.round(f.alt/100);
  body += `<div class="dSec">STATS</div>
  <div class="statsGrid">
    <div class="statCard"><div class="statLabel">Altitude</div><div class="statVal">FL${flNum}</div><div class="statSub">${f.alt.toLocaleString()} ft</div></div>
    <div class="statCard"><div class="statLabel">Speed</div><div class="statVal">${f.spd} kts</div><div class="statSub">${Math.round(f.spd*1.852)} km/h</div></div>
    <div class="statCard"><div class="statLabel">Heading</div><div class="statVal">${Math.round(f.hdg)}°</div><div class="statSub">${compassDir(f.hdg)}</div></div>
    <div class="statCard"><div class="statLabel">Vert. Rate</div><div class="statVal" style="color:${vrColor}">${vr>0?'+':''}${vr} fpm</div><div class="statSub">${vrLabel}</div></div>
    <div class="statCard"><div class="statLabel">Squawk</div><div class="statVal" style="font-family:'DM Mono',monospace;font-size:20px;">${f.sq}</div><div class="statSub">${f.emg?f.emgType:'Normal'}</div></div>
    <div class="statCard"><div class="statLabel">Position</div><div class="statVal" style="font-size:13px;">${f.lat.toFixed(3)}°</div><div class="statSub">${f.lng.toFixed(3)}°</div></div>
  </div>`;

  // Weather at destination
  body += `<div class="dSec">WEATHER AT DESTINATION</div>
  <div class="wxCard" id="wxCard"><div style="color:var(--t2);font-size:13px;">Fetching weather…</div></div>`;

  document.getElementById('detailBody').innerHTML = body;
  document.getElementById('detail').classList.add('open');
  fetchWeather(f);
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  detailFlight = null;
}

function trackFromDetail(){
  if(!detailFlight) return;
  closeDetail();
  sel(detailFlight);
  switchTab('map');
}

// ============================================================
// WEATHER FETCH
// ============================================================
function fetchWeather(f){
  const lat = f.destLat, lng = f.destLng;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,apparent_temperature&wind_speed_unit=kn&timezone=auto`;
  fetch(url).then(r=>r.json()).then(d=>{
    const c = d.current;
    const cond = WMO[c.weather_code] || 'Unknown';
    const wdir = compassDir(c.wind_direction_10m);
    const el = document.getElementById('wxCard');
    if(el) el.innerHTML = `
      <div class="wxRow">
        <div><div class="wxMain">${cond}</div><div class="wxSub">Feels like ${c.apparent_temperature}°C · Wind ${Math.round(c.wind_speed_10m)} kts ${wdir}</div></div>
        <div class="wxTemp">${c.temperature_2m}°C</div>
      </div>
      <div style="font-size:11px;color:rgba(0,122,255,0.6);margin-top:6px;">${f.destName}, ${f.destCity}</div>`;
  }).catch(()=>{
    const el = document.getElementById('wxCard');
    if(el) el.innerHTML = `<div style="color:var(--t2);font-size:13px;">Weather unavailable</div>`;
  });
}

// HUD
// ============================================================
function updateHud(){
  const hud = document.getElementById('hud');
  if(!selFlight){ hud.classList.remove('show'); return; }
  const f = selFlight;
  hud.classList.add('show');
  document.getElementById('hudCall').textContent = f.callsign;
  document.getElementById('hudRoute').textContent = `${f.orig} → ${f.dest}`;
  const vr = f.vspd;
  const vrStr = `${vr>0?'+':''}${vr} fpm`;
  document.getElementById('hudStats').innerHTML = `
    <span class="hstat">ALT <b>FL${Math.round(f.alt/100)}</b></span>
    <span class="hstat">SPD <b>${f.spd}kts</b></span>
    <span class="hstat">HDG <b>${Math.round(f.hdg)}°</b></span>
    <span class="hstat">V/S <b>${vrStr}</b></span>
  `;
}

function sel(f){
  selFlight = f;
  // Update all markers to reflect selection
  for(const [id, {marker}] of markers){
    const flight = allFl.find(x=>x.id===id);
    if(flight) marker.setIcon(makeIcon(flight, id === f.id));
  }
  // Draw route line
  if(routeLine) mp.removeLayer(routeLine);
  routeLine = L.polyline([[f.origLat, f.origLng],[f.destLat, f.destLng]],{
    color:'rgba(0,122,255,0.5)', weight:2, dashArray:'6 6'
  }).addTo(mp);
  mp.panTo([f.lat, f.lng], {animate:true, duration:0.8});
  updateHud();
  switchTab('map');
}

function clearSel(){
  selFlight = null;
  if(routeLine){ mp.removeLayer(routeLine); routeLine = null; }
  for(const [id, {marker}] of markers){
    const flight = allFl.find(x=>x.id===id);
    if(flight) marker.setIcon(makeIcon(flight, false));
  }
  updateHud();
}

// ============================================================
// NAV
// ============================================================
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');

  const panelDivs = ['flightsPanel','atcPanel','airportsPanel','emergencyPanel'];
  panelDivs.forEach(d=>{ const el=document.getElementById(d); if(el) el.style.display='none'; });

  if(tab === 'map'){
    closePanel();
    return;
  }

  let showId = null;
  if(tab==='flights'){ showId='flightsPanel'; renderFlights(); }
  else if(tab==='atc'){ showId='atcPanel'; }
  else if(tab==='airports'){ showId='airportsPanel'; renderAirports(); }
  else if(tab==='emergency'){ showId='emergencyPanel'; renderEmergency(); }

  if(showId){
    const el = document.getElementById(showId);
    if(el) el.style.display='flex';
    document.getElementById('panel').classList.add('open');
  }
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

// ============================================================
function setSort(k){
  sortKey = k;
  document.querySelectorAll('#sortChips .chip').forEach(c=>{
    c.classList.toggle('on', c.textContent.toLowerCase()===k);
  });
  renderFlights();
}

function renderFlights(){
  const sorted = [...allFl].sort((a,b)=>{
    if(sortKey==='callsign') return a.callsign.localeCompare(b.callsign);
    if(sortKey==='altitude') return b.alt - a.alt;
    if(sortKey==='speed') return b.spd - a.spd;
    if(sortKey==='origin') return a.orig.localeCompare(b.orig);
    if(sortKey==='dest') return a.dest.localeCompare(b.dest);
    return 0;
  });
  const list = document.getElementById('flightsList');
  // Render first 200 for performance
  const shown = sorted.slice(0,200);
  list.innerHTML = `<div style="font-size:11px;color:var(--t2);padding:0 2px 8px;">Showing ${shown.length} of ${allFl.length} flights</div>` +
    shown.map(f => {
      const emgBit = f.emg ? `<span class="sqBadge" style="margin-left:4px;">${f.sq}</span>` : '';
      return `<div class="flRow" onclick="openDetail(${f.id})">
        <span class="flCall" style="${f.emg?'color:var(--rd);':''}">${f.callsign}</span>
        <div class="flInfo"><b>${f.orig} → ${f.dest}</b>${f.airline}${emgBit}</div>
        <div class="flRight"><b>FL${Math.round(f.alt/100)}</b>${f.spd}kts</div>
      </div>`;
    }).join('');
}

// ============================================================
// EMERGENCY PANEL
// ============================================================
function timeAgo(date){
  const diff = Date.now() - new Date(date).getTime();
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  if(h>0) return `${h}h ${m}m ago`;
  return `${m}m ago`;
}

function renderEmergency(){
  const active = emfl.filter(f=>f.emgActive).length;
  const list = document.getElementById('emergencyList');
  list.innerHTML = `<div class="emgHeader">
    <div class="emgHeaderTitle">DECLARED IN LAST 24H</div>
    <div class="emgHeaderSub">${active} ACTIVE · ${emfl.length} TOTAL</div>
  </div>` +
  emfl.map(f => {
    const sqColor = f.sq==='7700'?'#FF9F0A': f.sq==='7500'?'#FF3B30':'#007AFF';
    return `<div class="emgRow" onclick="openDetail(${f.id})">
      <div>
        <div class="emgCall">${f.callsign}</div>
        <div style="font-size:11px;color:var(--t2);margin-top:2px;">${timeAgo(f.emgTime)}</div>
      </div>
      <div style="flex:1;padding:0 8px;">
        <div style="font-size:12px;color:var(--t);">${f.orig} → ${f.dest}</div>
        <div style="margin-top:4px;"><span class="sqBadge" style="border-color:${sqColor};color:${sqColor};background:${sqColor}22;">${f.sq}</span> <span style="font-size:11px;color:var(--t2);">${f.emgType}</span></div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;color:var(--t);">FL${Math.round(f.alt/100)}</div>
        <div style="margin-top:4px;"><span class="badge ${f.emgActive?'red':'gray'}">${f.emgActive?'Active':'Resolved'}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// ATC
// ============================================================
let cachedVoices = [];
function loadVoices(){ cachedVoices = window.speechSynthesis?.getVoices() || []; }
window.speechSynthesis?.addEventListener('voiceschanged', loadVoices);

function getAudioCtx(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  return audioCtx;
}

function playStatic(){
  try {
    const ctx = getAudioCtx();
    if(!ctx) return;
    const dur = 0.08;
    const bufSize = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + dur + 0.01);
  } catch(e){}
}

function speakNext(){
  if(!atcOn || atcQueue.length === 0) return;
  if(window.speechSynthesis?.speaking) return;
  const msg = atcQueue.shift();
  playStatic();
  setTimeout(()=>{
    const utt = new SpeechSynthesisUtterance(msg);
    utt.rate = 1.05; utt.pitch = 1; utt.volume = 0.85;
    // Pick voice
    let voice = null;
    if(cachedVoices.length){
      voice = cachedVoices.find(v=>v.name.includes('Google US English')) ||
              cachedVoices.find(v=>v.lang==='en-US') ||
              cachedVoices.find(v=>v.lang.startsWith('en')) ||
              cachedVoices[0];
    }
    if(voice) utt.voice = voice;
    utt.onend = () => { setTimeout(speakNext, 400); };
    window.speechSynthesis?.speak(utt);
  }, 100);
}

function toggleAtc(){
  atcOn = !atcOn;
  const btn = document.getElementById('atcToggle');
  btn.classList.toggle('on', atcOn);
  btn.textContent = atcOn ? '● LIVE' : '○ OFF';
  if(!atcOn) window.speechSynthesis?.cancel();
}

const ATC_TYPES = ['Tower','Approach','Ground','Center','Departure'];
const ATC_PHRASES = [
  (call,fl,hdg) => `${call}, ${pick(ATC_TYPES)}, climb and maintain flight level ${fl}, heading ${hdg}`,
  (call,fl) => `${call}, descend to flight level ${fl}, reduce speed to two-five-zero`,
  (call) => `${call}, traffic alert, traffic twelve o'clock, five miles, opposite direction`,
  (call,fl) => `${call}, maintain flight level ${fl}, expect vectors for approach`,
  (call) => `${call}, ${pick(ATC_TYPES)}, roger, squawk ident`,
  (call) => `${call}, contact approach on one-two-four point seven`,
  (call,fl) => `${call}, cleared to climb flight level ${fl}. Wind two-seven-zero at one-five`,
  (call) => `${call}, hold short of runway two-eight. Traffic landing`,
  (call,fl,hdg) => `${call}, turn right heading ${hdg}, maintain flight level ${fl}`,
  (call) => `${call}, report established on the localizer`
];

function genAtcMsg(){
  const f = pick(allFl);
  const fl = rndInt(150,430);
  const hdg = rndInt(0,35)*10;
  const fn = pick(ATC_PHRASES);
  return fn(f.callsign, fl, String(hdg).padStart(3,'0'));
}

function addAtcLog(text){
  const log = document.getElementById('atcLog');
  const now = new Date();
  const ts = now.toUTCString().slice(17,25)+'Z';
  const type = pick(ATC_TYPES);
  const div = document.createElement('div');
  div.className = 'atcMsg';
  div.innerHTML = `<div class="atcTop"><span class="atcFrom">${type.toUpperCase()}</span><span class="atcTime">${ts}</span></div><div class="atcText">${text}</div>`;
  log.prepend(div);
  // Keep max 30 messages in DOM
  while(log.children.length > 30) log.removeChild(log.lastChild);
}

// ============================================================
// AIRPORTS PANEL
// ============================================================
function renderAirports(){
  const list = document.getElementById('airportsList');
  list.innerHTML = AIRPORTS.map(ap => {
    const arrivals = allFl.filter(f=>f.dest===ap.iata).length;
    const departures = allFl.filter(f=>f.orig===ap.iata).length;
    return `<div class="aptRow" onclick="mp.setView([${ap.lat},${ap.lng}],8);switchTab('map');">
      <span class="aptCode">${ap.iata}</span>
      <div class="aptInfo"><b>${ap.name}</b>${ap.city}, ${ap.country}</div>
      <div class="aptTraffic"><b>${arrivals}</b>arr · <b>${departures}</b>dep</div>
    </div>`;
  }).join('');
}

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchBtn').onclick = ()=>{
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').focus();
};

function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
}

function doSearch(q){
  const res = document.getElementById('searchResults');
  if(!q.trim()){ res.innerHTML=''; return; }
  const lq = q.toLowerCase();
  const matches = allFl.filter(f=>
    f.callsign.toLowerCase().includes(lq) ||
    f.orig.toLowerCase().includes(lq) ||
    f.dest.toLowerCase().includes(lq) ||
    f.airline.toLowerCase().includes(lq) ||
    f.ac.toLowerCase().includes(lq)
  ).slice(0,40);
  res.innerHTML = matches.map(f=>`
    <div class="flRow" onclick="closeSearch();openDetail(${f.id});">
      <span class="flCall" style="${f.emg?'color:var(--rd);':''}">${f.callsign}</span>
      <div class="flInfo"><b>${f.orig} → ${f.dest}</b>${f.airline}</div>
      <div class="flRight"><b>FL${Math.round(f.alt/100)}</b>${f.spd}kts</div>
    </div>`).join('') || `<div style="color:var(--t2);padding:20px;text-align:center;">No results for "${q}"</div>`;
}

// ============================================================
// ATC GENERATION
// ============================================================
setInterval(()=>{
  if(!atcOn) return;
  const msg = genAtcMsg();
  addAtcLog(msg);
  if(atcQueue.length > 4) atcQueue = atcQueue.slice(-2);
  atcQueue.push(msg);
  speakNext();
}, 2200);

// ============================================================
// FLIGHT POSITION UPDATES
// ============================================================
setInterval(()=>{
  for(const f of allFl){
    const spd = f.spd * 0.000145; // approx degrees per second at typical lat
    const rad = f.hdg * Math.PI / 180;
    f.lat += Math.cos(rad) * spd * 3;
    f.lng += Math.sin(rad) * spd * 3;
    // Slight drift
    f.alt += rnd(-20,20);
    f.alt = Math.max(1000, Math.min(45000, f.alt));
    f.spd += rnd(-2,2);
    f.spd = Math.max(200, Math.min(620, f.spd));
    f.vspd += rnd(-50,50);
    f.vspd = Math.max(-2000, Math.min(2000, f.vspd));
    f.hdg += rnd(-0.3, 0.3);
    if(f.hdg < 0) f.hdg += 360;
    if(f.hdg >= 360) f.hdg -= 360;
    // Wrap around globe
    if(f.lat > 85) f.lat = 85;
    if(f.lat < -85) f.lat = -85;
    if(f.lng > 180) f.lng -= 360;
    if(f.lng < -180) f.lng += 360;
    // Update progress
    if(f.prog < 99) f.prog += 0.01;
  }
  updateVisibleMarkers();
  if(selFlight){
    const updated = allFl.find(x=>x.id===selFlight.id);
    if(updated){ selFlight = updated; updateHud(); }
    if(routeLine){ mp.removeLayer(routeLine); routeLine = L.polyline([[selFlight.origLat,selFlight.origLng],[selFlight.destLat,selFlight.destLng]],{color:'rgba(0,122,255,0.5)',weight:2,dashArray:'6 6'}).addTo(mp); }
  }
}, 3000);

// ============================================================
// CLOCK
// ============================================================
function updateClock(){
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}Z`;
}
setInterval(updateClock, 1000);

// Panel swipe-to-dismiss
(function(){
  const panel = document.getElementById('panel');
  let startY = 0, isDragging = false;
  panel.addEventListener('touchstart', e=>{
    startY = e.touches[0].clientY;
    isDragging = true;
  },{passive:true});
  panel.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0) panel.style.transform = `translateY(${dy}px)`;
  },{passive:true});
  panel.addEventListener('touchend', e=>{
    const dy = e.changedTouches[0].clientY - startY;
    panel.style.transform = '';
    isDragging = false;
    if(dy > 80) closePanel();
  });
})();

// ============================================================
// INIT
// ============================================================
updateClock();
loadVoices();
setTimeout(loadVoices, 500);
updateVisibleMarkers();
// Seed initial ATC log
for(let i=0;i<5;i++) addAtcLog(genAtcMsg());
</script>
