<title>SkyWay — Live Flight Tracker</title>

<style>

.m{font-family:'DM Mono',monospace}

@keyframes ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(3);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}

#globe-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#top-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#020604ee,#02060400);pointer-events:none}

#search-overlay{position:fixed;inset:0;z-index:200;background:#020604f5;display:none;flex-direction:column;backdrop-filter:blur(20px)}

.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--t3);cursor:pointer;padding:6px 12px;border-radius:10px;font-family:'Sora';font-size:9px;font-weight:500;letter-spacing:.5px;transition:color .2s}

#panel{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--s);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:72vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px #00000088}
#panel.open{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto 6px}
.ph{padding:4px 16px 10px;border-bottom:1px solid var(--bd)}
.pb{flex:1;overflow-y:auto;overscroll-behavior:contain}
#hud{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:90;display:none;padding:8px 16px;border-radius:16px;background:#0a0f0cdd;border:1px solid var(--a2);backdrop-filter:blur(16px);align-items:center;gap:10px;white-space:nowrap}

.fc{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;cursor:pointer}
.fc:active{background:#00e87b0a}
</style>
</head>

  else if(t==="airports"){pt.textContent="Airports";pb.innerHTML=AP.map(a=>`<div class="fc" data-ac="${a.code}" style="border-left:2px solid ${sa.code===a.code?"var(--a)":"transparent"}"><div style="flex:1"><div style="display:flex;justify-content:space-between"><span class="m" style="font-size:14px;font-weight:500;color:${sa.code===a.code?"var(--a)":"var(--t)"}">${a.code}</span><span style="font-size:10px;color:var(--t3)">${a.co}</span></div><div style="font-size:11px;color:var(--t2);margin-top:2px">${a.name} — ${a.city}</div></div></div>`).join("");pb.querySelectorAll("[data-ac]").forEach(c=>c.onclick=()=>{sa=AP.find(a=>a.code===c.dataset.ac);sw("atc");});}
