<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#040806;color:#a0c0b0;font-family:'Outfit',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#050c08}
::-webkit-scrollbar-thumb{background:#1a3a2a;border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ping{0%{transform:scale(1);opacity:.6}100%{transform:scale(3);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 4px #00ff8833}50%{box-shadow:0 0 14px #00ff8866}}
@keyframes waveBar{0%,100%{height:3px}50%{height:var(--h)}}
input[type=range]{-webkit-appearance:none;background:transparent;width:100%}
input[type=range]::-webkit-slider-track{height:3px;background:#1a2a20;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#00ff88;margin-top:-4.5px;cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace}
.panel{background:#050907;display:flex;flex-direction:column}
.tab-btn{flex:1;padding:7px;background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{color:#00ff88;border-bottom-color:#00ff88}
.tab-btn:not(.active){color:#1a3a2a}
.filter-pill{padding:3px 8px;border-radius:10px;border:none;cursor:pointer;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;transition:all .15s}
.flight-row{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-bottom:1px solid #080f0b;transition:all .1s;border-left:2px solid transparent}
.flight-row:hover{background:#0a1a14}
.flight-row.selected{background:#0a2a1c;border-left-color:#00ff88}
.airport-row{padding:7px 10px;cursor:pointer;border-bottom:1px solid #080f0b;border-left:2px solid transparent;transition:all .1s}
.airport-row:hover{background:#0a1a14}
.airport-row.selected{background:#0a2a1c;border-left-color:#00ff88}
.atc-msg{padding:6px 8px;margin-bottom:3px;border-radius:5px;background:#080f0b;animation:fadeIn .3s}
.detail-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #0a1510}
select{width:100%;padding:5px 7px;background:#0a1510;color:#a0c0b0;border:1px solid #1a2a20;border-radius:4px;outline:none;font-family:'JetBrains Mono',monospace;font-size:10px}
</style>

globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(GLOBE_R*1.02,64,64),new THREE.ShaderMaterial({

  fragmentShader:`varying vec3 vN;void main(){float i=pow(.62-dot(vN,vec3(0,0,1)),3.5);gl_FragColor=vec4(0.,1.,.53,1.)*i*.45;}`,
  blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true

  vertexShader:atmosVS,

  blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true

function ll2v(lat,lng,r){
  r=r||GLOBE_R;
  const p=(90-lat)*Math.PI/180,t=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}

// Flight objects
let flightMeshes=[];
let routeObjects=[];
const raycaster=new THREE.Raycaster();
const mouseVec=new THREE.Vector2();

function updateFlightMeshes(){
  flightMeshes.forEach(m=>{globeGroup.remove(m);m.geometry?.dispose();m.material?.dispose();});
  flightMeshes=[];
  flights.forEach(f=>{
    const sel=selectedFlight?.id===f.id;
    const pos=ll2v(f.lat,f.lng,sel?GLOBE_R*1.045:GLOBE_R*1.025);
    const m=new THREE.Mesh(new THREE.SphereGeometry(sel?.06:.024,sel?10:6,sel?10:6),
      new THREE.MeshBasicMaterial({color:sel?0x00ff88:0xffaa33,transparent:true,opacity:sel?1:.8}));
    m.position.copy(pos);m.userData={flightId:f.id};globeGroup.add(m);flightMeshes.push(m);
    if(sel){
      const g1=new THREE.Mesh(new THREE.SphereGeometry(.15,12,12),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.2}));
      g1.position.copy(pos);globeGroup.add(g1);flightMeshes.push(g1);
    }
  });
}

function updateRoute(){
  routeObjects.forEach(o=>{globeGroup.remove(o);o.geometry?.dispose();o.material?.dispose();});
  routeObjects=[];
  if(!selectedFlight)return;
  const s=ll2v(selectedFlight.origin.lat,selectedFlight.origin.lng,GLOBE_R*1.004);
  const e=ll2v(selectedFlight.destination.lat,selectedFlight.destination.lng,GLOBE_R*1.004);
  const m=s.clone().add(e).multiplyScalar(.5).normalize().multiplyScalar(GLOBE_R*1.3);
  const curve=new THREE.QuadraticBezierCurve3(s,m,e);
  const pts=curve.getPoints(100);
  const si=Math.floor(pts.length*selectedFlight.progress/100);
  if(si>1){const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.slice(0,si+1)),new THREE.LineBasicMaterial({color:0x00ff88,transparent:true,opacity:.7}));globeGroup.add(l);routeObjects.push(l);}
  const rl=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.slice(Math.max(0,si))),new THREE.LineBasicMaterial({color:0x00ff88,transparent:true,opacity:.18}));globeGroup.add(rl);routeObjects.push(rl);
  [s,e].forEach((p,i)=>{const r=new THREE.Mesh(new THREE.SphereGeometry(.065,10,10),new THREE.MeshBasicMaterial({color:i===0?0x00ff88:0xff6644,transparent:true,opacity:.6}));r.position.copy(p);globeGroup.add(r);routeObjects.push(r);});
}

// Globe rotation
let rot={x:.35,y:-.3},tgtRot={x:.35,y:-.3};
let autoRotate=true,isDragging=false,dragX=0,dragY=0;

function resizeGlobe(){
  const c=document.getElementById("globe-container");
  const w=c.clientWidth,h=c.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}

function animateGlobe(){
  requestAnimationFrame(animateGlobe);
  if(autoRotate&&!isDragging)tgtRot.y+=.0008;
  rot.x+=(tgtRot.x-rot.x)*.06;rot.y+=(tgtRot.y-rot.y)*.06;
  globeGroup.rotation.x=rot.x;globeGroup.rotation.y=rot.y;
  renderer.render(scene,camera);
}

// Mouse handlers on globe
const gc=document.getElementById("globe-container");
gc.addEventListener("mousedown",e=>{isDragging=true;dragX=e.clientX;dragY=e.clientY;autoRotate=false;gc.style.cursor="grabbing";});
gc.addEventListener("mousemove",e=>{
  if(isDragging){tgtRot.y+=(e.clientX-dragX)*.005;tgtRot.x+=(e.clientY-dragY)*.005;tgtRot.x=Math.max(-1.3,Math.min(1.3,tgtRot.x));dragX=e.clientX;dragY=e.clientY;}
  const rect=gc.getBoundingClientRect();
  mouseVec.x=((e.clientX-rect.left)/rect.width)*2-1;mouseVec.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouseVec,camera);
  const hits=raycaster.intersectObjects(flightMeshes);
  const tt=document.getElementById("tooltip");
  if(hits.length>0&&hits[0].object.userData.flightId){
    const f=flights.find(fl=>fl.id===hits[0].object.userData.flightId);
    if(f){
      tt.style.display="block";tt.style.left=(e.clientX-rect.left+16)+"px";tt.style.top=(e.clientY-rect.top-14)+"px";
      tt.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:8px;height:8px;border-radius:50%;background:${f.airline.color}"></div><span style="color:#00ff88;font-weight:800;font-size:14px;letter-spacing:1px">${f.id}</span></div><div style="color:#5a8a6a;font-size:10px;margin-bottom:6px">${f.airline.name} · ${f.aircraft.code}</div><div style="display:flex;gap:6px;margin-bottom:4px"><span style="color:#c0e0d0;font-size:12px;font-weight:700">${f.origin.code}</span><span style="color:#3a5a4a">→</span><span style="color:#c0e0d0;font-size:12px;font-weight:700">${f.destination.code}</span></div><div style="display:flex;gap:12px;font-size:10px;color:#4a7a5a"><span>FL${~~(f.altitude/100)}</span><span>${f.speed}kts</span><span>${f.heading}°</span></div>`;
      if(!isDragging)gc.style.cursor="pointer";
      tt._flight=f;
    }
  }else{tt.style.display="none";tt._flight=null;if(!isDragging)gc.style.cursor="grab";}
});
gc.addEventListener("mouseup",()=>{isDragging=false;gc.style.cursor="grab";setTimeout(()=>{autoRotate=true;},4000);});
gc.addEventListener("mouseleave",()=>{isDragging=false;document.getElementById("tooltip").style.display="none";});
gc.addEventListener("click",()=>{const tt=document.getElementById("tooltip");if(tt._flight){selectFlight(tt._flight);}});
gc.addEventListener("wheel",e=>{camera.position.z=Math.max(7.5,Math.min(25,camera.position.z+e.deltaY*.008));},{passive:true});

  if(!fc)return;
  fc.innerHTML=["all","tower","approach","ground","center","departure","atis"].map(f=>`<button class="filter-pill" data-filter="${f}" style="background:${atcFilter===f?(f==="all"?"#00ff8822":(TC[f]||"#00ff88")+"22"):"#0a1510"};color:${atcFilter===f?(f==="all"?"#00ff88":(TC[f]||"#00ff88")):"#2a4a3a"}">${f}</button>`).join("");
  fc.querySelectorAll(".filter-pill").forEach(b=>b.addEventListener("click",()=>{atcFilter=b.dataset.filter;renderATCFilters();renderATCFeed();}));
}

function renderATCFeed(){
  const feed=document.getElementById("atc-feed");
  if(!feed)return;
  const msgs=atcFilter==="all"?atcMessages:atcMessages.filter(m=>m.type===atcFilter);
  feed.innerHTML=msgs.map(m=>`<div class="atc-msg" style="border-left:2px solid ${TC[m.type]}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:7.5px;font-weight:800;color:${TC[m.type]};letter-spacing:1px;text-transform:uppercase;background:${TC[m.type]}15;padding:1px 5px;border-radius:3px">${m.type}</span><span style="color:#00ff88;font-weight:700;font-size:11px">${m.callsign}</span></div><span style="color:#1a3a2a;font-size:8px">${m.time}Z</span></div><div style="color:#7aaa8a;line-height:1.45;font-size:10px">${m.msg}</div></div>`).join("");
  feed.scrollTop=feed.scrollHeight;
}

function renderAudio(rc){
  const ap=selectedAirport;
  const feedLabels=ap.feeds.map(f=>{if(f.includes("twr"))return"Tower";if(f.includes("app"))return"Approach";if(f.includes("gnd"))return"Ground";if(f.includes("dep"))return"Departure";return"Feed";});
  rc.innerHTML=`<div style="padding:6px 8px;border-bottom:1px solid #0f1a14;flex-shrink:0"><select id="audio-airport-sel">${AIRPORTS.map(a=>`<option value="${a.code}" ${ap.code===a.code?"selected":""}>${a.code} — ${a.name}</option>`).join("")}</select></div>
  <div style="padding:10px;overflow-y:auto;flex:1">
    <div class="mono" style="font-size:8px;color:#2a4a3a;letter-spacing:2px;margin-bottom:10px">LIVE ATC AUDIO — ${ap.code}</div>
    <div id="audio-feeds" style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px">${ap.feeds.map((f,i)=>`<div class="audio-feed-row" data-idx="${i}" style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;cursor:pointer;background:${audioFeedIdx===i?"#0a2e1c":"#0a1510"};border:1px solid ${audioFeedIdx===i?"#00ff8840":"#1a2a20"}"><div style="display:flex;align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:${audioFeedIdx===i?"#00ff88":"#2a4a3a"}"></div><div><div class="mono" style="font-size:11px;font-weight:700;color:${audioFeedIdx===i?"#00ff88":"#6a9a7a"}">${feedLabels[i]}</div><div class="mono" style="font-size:8px;color:#2a4a3a">${ap.freq[i]||"—"}</div></div></div></div>`).join("")}</div>
    <div style="background:#0a1510;border-radius:8px;padding:12px;border:1px solid #1a2a20">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="mono" style="flex:1"><div style="font-size:11px;font-weight:700;color:#00ff88">${feedLabels[audioFeedIdx]} — ${ap.code}</div><div style="font-size:9px;color:#3a5a4a">${ap.name}</div></div>
      </div>
      <div style="margin-top:8px;text-align:center">
        <a href="https://www.liveatc.net/listen.php?mount=${ap.feeds[audioFeedIdx]}&icao=${ap.code.toLowerCase()}" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:10px 24px;border-radius:8px;background:#00ff8818;border:1px solid #00ff8844;color:#00ff88;font-size:12px;text-decoration:none;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:1px;transition:all .2s">▶ LISTEN LIVE ON LIVEATC.NET</a>
        <div style="font-size:8px;color:#2a4a3a;margin-top:8px;line-height:1.4">Opens LiveATC.net in a new tab for reliable, high-quality ATC audio streaming</div>
      </div>
    </div>
    <div style="margin-top:12px;background:#0a1510;border-radius:8px;padding:10px;border:1px solid #1a2a20">
      <div class="mono" style="font-size:8px;color:#2a4a3a;letter-spacing:1px;margin-bottom:6px">ALL ${ap.code} FREQUENCIES</div>
      ${ap.feeds.map((f,i)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0a1510"><span style="color:#4a7a5a;font-size:9px">${feedLabels[i]}</span><span class="mono" style="color:#8aaa9a;font-size:11px;font-weight:600">${ap.freq[i]||"—"} MHz</span></div>`).join("")}
    </div>
    <a href="https://www.liveatc.net/search/?icao=${ap.code}" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;margin-top:10px;padding:8px;border-radius:6px;background:#0a1510;border:1px solid #1a2a20;color:#4a7a5a;font-size:10px;text-decoration:none;font-family:'JetBrains Mono',monospace">Browse all ${ap.code} feeds on LiveATC.net ↗</a>
  </div>`;
  document.getElementById("audio-airport-sel").addEventListener("change",e=>{selectedAirport=AIRPORTS.find(a=>a.code===e.target.value);audioFeedIdx=0;renderAudio(rc);});
  document.querySelectorAll(".audio-feed-row").forEach(r=>r.addEventListener("click",()=>{audioFeedIdx=parseInt(r.dataset.idx);renderAudio(rc);}));
}

// HUD
function renderHUD(){
  const hud=document.getElementById("flight-hud");
  if(!selectedFlight){hud.style.display="none";return;}
  const f=selectedFlight;
  hud.style.display="flex";
  hud.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${f.airline.color};border:1px solid #ffffff22"></div><span class="mono" style="color:#00ff88;font-weight:800;font-size:14px;letter-spacing:1px">${f.id}</span><div style="width:1px;height:14px;background:#1a2a20"></div><span style="color:#5a8a6a;font-size:11px">${f.origin.code} → ${f.destination.code}</span><div style="width:1px;height:14px;background:#1a2a20"></div><span style="color:#4a7a5a;font-size:10px">FL${~~(f.altitude/100)} · ${f.speed}kts</span><button onclick="selectedFlight=null;renderAll()" style="background:none;border:none;color:#3a5a4a;cursor:pointer;font-size:14px;margin-left:4px">×</button>`;
}

function renderAll(){
  renderStats();renderLeftPanel();renderRightPanel();renderHUD();
  updateFlightMeshes();updateRoute();
}

// Event listeners
document.getElementById("search-input").addEventListener("input",e=>{searchQuery=e.target.value;renderLeftPanel();});
document.getElementById("flights-tab-btn").addEventListener("click",()=>{listTab="flights";renderLeftPanel();});
document.getElementById("airports-tab-btn").addEventListener("click",()=>{listTab="airports";renderLeftPanel();});
document.getElementById("detail-tab-btn").addEventListener("click",()=>{rightTab="detail";renderRightPanel();});
document.getElementById("atc-tab-btn").addEventListener("click",()=>{rightTab="atc";renderRightPanel();});
document.getElementById("audio-tab-btn").addEventListener("click",()=>{rightTab="audio";renderRightPanel();});
document.getElementById("left-toggle").addEventListener("click",()=>{leftOpen=!leftOpen;renderLeftPanel();});
document.getElementById("right-toggle").addEventListener("click",()=>{rightOpen=!rightOpen;renderRightPanel();});

// Live updates
setInterval(()=>{
  flights.forEach(f=>{
    f.lat=Math.max(-85,Math.min(85,f.lat+(Math.random()-.48)*.03));
    f.lng=((f.lng+(Math.random()-.48)*.04+180)%360)-180;
    f.altitude=Math.max(5000,Math.min(45000,f.altitude+~~((Math.random()-.5)*100)));
    f.speed=Math.max(250,Math.min(620,f.speed+~~((Math.random()-.5)*5)));
    f.heading=(f.heading+~~((Math.random()-.5)*2)+360)%360;
  });
  renderStats();updateFlightMeshes();updateRoute();
},3000);

// ATC message generator
setInterval(()=>{
  const tmpl=rnd(ATC_T);
  const al=rnd(AIRLINES);
  const cs=`${al.logo}${100+~~(Math.random()*900)}`;
  const n=new Date();
  const t=`${n.getUTCHours().toString().padStart(2,"0")}:${n.getUTCMinutes().toString().padStart(2,"0")}:${n.getUTCSeconds().toString().padStart(2,"0")}`;
  const msg=tmpl.type==="atis"?tmpl.gen():tmpl.gen(cs);
  atcMessages.push({type:tmpl.type,callsign:tmpl.type==="atis"?"ATIS":cs,time:t,msg,id:Date.now()});
  if(atcMessages.length>60)atcMessages=atcMessages.slice(-60);
  if(rightTab==="atc")renderATCFeed();
},2200);

// Init
renderAll();
</script>

</body>
</html>
